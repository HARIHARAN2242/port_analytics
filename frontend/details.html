<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Port Details | HH Port Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .updated-time{
    color:#64748b;
    margin-bottom:20px;
}
       .metrics-row{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
    margin:25px 0;
}

.metric-box{
    background:white;
    border:1px solid #e2e8f0;
    border-radius:12px;
    padding:15px;
    text-align:center;
}

.metric-box h4{
    color:#64748b;
}

.metric-box p{
    color:#0ea5e9;
    font-size:22px;
    font-weight:700;
} 
        .status-banner{
    background:#fee2e2;
    color:#b91c1c;
    padding:15px;
    border-left:6px solid #ef4444;
    border-radius:10px;
    font-weight:600;
    margin-bottom:20px;
}
        :root { --bg: #ffffff; --text: #0f172a; --blue: #0ea5e9; --card: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); padding: 40px; margin: 0; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; border: 1px solid #e2e8f0; }
        
        .header { display:flex; justify-content:space-between; align-items:center; margin-bottom: 30px; }
        .back-btn { color: var(--blue); text-decoration: none; font-weight: 600; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 12px; border-left: 5px solid var(--blue); border: 1px solid #e2e8f0; }
        .stat-card h3 { margin: 0; font-size: 0.9em; color: #64748b; }
        .stat-card p { margin: 10px 0 0 0; font-size: 1.5em; font-weight: bold; }
        
        .download-btn { background: var(--blue); color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; border: none; font-weight: bold; }
        .chart-wrapper { position: relative; width: 100%; height: 350px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="index.html" class="back-btn">← Back to Dashboard</a>
        <button id="downloadBtn" class="download-btn">Download CSV</button>
    </div>
    
    <h1 id="port-title">Loading Port...</h1>
    <p class="updated-time">
    Last Updated: 23 June 2026 • 2:05 PM
</p>
    <div class="stats-grid" id="data-container"></div>
    <div class="status-banner">
    ⚠ Current Operational Status: Heavily Disrupted Operations
    <div class="metrics-row">

    <div class="metric-box">
        <h4>Average Delay</h4>
        <p>3.1 Days</p>
    </div>

    <div class="metric-box">
        <h4>Maximum Delay</h4>
        <p>7 Days</p>
    </div>

    <div class="metric-box">
        <h4>Minimum Delay</h4>
        <p>0 Days</p>
    </div>

    <div class="metric-box">
        <h4>Records</h4>
        <p>36</p>
    </div>

</div>
</div>
    <div class="chart-wrapper">
        <canvas id="portChart"></canvas>
    </div>
</div>

<script>
    const portName = localStorage.getItem('selectedPort');
    if (!portName) window.location.href = 'index.html';
    document.getElementById('port-title').innerText = portName;

    // Handle CSV Download
    document.getElementById('downloadBtn').onclick = async () => {
        try {
            const response = await fetch(`/api/download/${encodeURIComponent(portName)}`);
            if (!response.ok) throw new Error("Download failed");
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${portName.replace(/\s+/g, '_')}_data.csv`;
            document.body.appendChild(a);
            a.click();
            a.remove();
        } catch (err) { alert("Could not download file."); }
    };

    // Data Fetching and Chart Rendering
    async function loadData() {
        try {
            const res = await fetch(`/api/port-details/${encodeURIComponent(portName)}`);
            const data = await res.json();
            
            if (data && data.length > 0) {
                const latest = data[0];
                document.getElementById('data-container').innerHTML = `
                    <div class="stat-card"><h3>Status</h3><p>${latest.operational_status || 'N/A'}</p></div>
                    <div class="stat-card"><h3>Waiting Time</h3><p>${latest.current_waiting_time_days || 0}d</p></div>
                    <div class="stat-card"><h3>Arrival Delay</h3><p>${latest.current_arrival_delay_days || 0}d</p></div>
                    <div class="stat-card"><h3>At Berth</h3><p>${latest.vessels_at_berth || 0}</p></div>
                `;
                
                const ctx = document.getElementById('portChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.map(d => d.period_label),
                        datasets: [{ 
                            label: 'Delay Trends (Days)', 
                            data: data.map(d => d.graph_value_days), 
                            borderColor: '#0ea5e9',
                            backgroundColor: 'rgba(14, 165, 233, 0.1)',
                            fill: true,
                            tension: 0.3
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });
            }
        } catch (err) {
            console.error("Error:", err);
            document.getElementById('data-container').innerHTML = "<p>Data unavailable.</p>";
        }
    }
    loadData();
</script>
</body>
</html>
