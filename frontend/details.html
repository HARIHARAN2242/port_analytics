<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Port Details | HH Port Analytics</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
    --blue:#0ea5e9;
}

body{
    font-family:'Segoe UI',sans-serif;
    background:#f8fafc;
    margin:0;
    padding:40px;
}

.container{
    max-width:1100px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:16px;
    border:1px solid #e2e8f0;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.back-btn{
    color:var(--blue);
    text-decoration:none;
    font-weight:600;
}

.download-btn{
    background:var(--blue);
    color:white;
    border:none;
    padding:12px 22px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
}

.updated-time{
    color:#64748b;
    margin-bottom:20px;
}

.status-banner{
    padding:16px;
    border-radius:12px;
    margin-bottom:25px;
    font-weight:600;
}

.stats-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    margin-bottom:30px;
}

.stat-card{
    background:#f8fafc;
    border:1px solid #e2e8f0;
    border-radius:12px;
    padding:20px;
}

.stat-card h3{
    color:#64748b;
    margin:0;
    font-size:14px;
}

.stat-card p{
    margin-top:12px;
    font-size:20px;
    font-weight:bold;
}

.metrics-row{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    margin-bottom:30px;
}

.metric-box{
    background:white;
    border:1px solid #e2e8f0;
    border-radius:12px;
    text-align:center;
    padding:20px;
}

.metric-box h4{
    color:#64748b;
}

.metric-box p{
    color:#0ea5e9;
    font-size:28px;
    font-weight:700;
}

.chart-card{
    background:white;
    border:1px solid #e2e8f0;
    border-radius:12px;
    padding:20px;
}

.chart-wrapper{
    height:400px;
}

@media(max-width:900px){
    .stats-grid,
    .metrics-row{
        grid-template-columns:1fr;
    }
}
</style>

</head>

<body>

<div class="container">

<div class="header">
<a href="index.html" class="back-btn">← Back to Dashboard</a>

<button id="downloadBtn" class="download-btn">
Download CSV file
</button>
</div>

<h1 id="port-title">Loading Port...</h1>

<p class="updated-time">
Last Updated:
<span id="updateTime"></span>
</p>

<div id="statusBanner" class="status-banner">
Loading Status...
</div>

<div id="data-container" class="stats-grid"></div>

<div class="metrics-row">

<div class="metric-box">
<h4>Average Delay</h4>
<p id="avgDelay">-</p>
</div>

<div class="metric-box">
<h4>Maximum Delay</h4>
<p id="maxDelay">-</p>
</div>

<div class="metric-box">
<h4>Minimum Delay</h4>
<p id="minDelay">-</p>
</div>

<div class="metric-box">
<h4>Records</h4>
<p id="recordCount">-</p>
</div>

</div>

<div class="chart-card">
<h3>Delay Trend Analysis</h3>

<div class="chart-wrapper">
<canvas id="portChart"></canvas>
</div>
</div>

</div>

<script>

const portName = localStorage.getItem("selectedPort");

if(!portName){
    window.location.href="index.html";
}

document.getElementById("port-title").innerText = portName;

document.getElementById("updateTime").innerText =
new Date().toLocaleString();

document.getElementById("downloadBtn").onclick = async () => {

    const response =
    await fetch(`/api/download/${encodeURIComponent(portName)}`);

    const blob = await response.blob();

    const url = window.URL.createObjectURL(blob);

    const a = document.createElement("a");

    a.href = url;
    a.download = `${portName}.csv`;

    document.body.appendChild(a);

    a.click();

    a.remove();
};

async function loadData(){

try{

const response =
await fetch(`/api/port-details/${encodeURIComponent(portName)}`);

const data = await response.json();

if(!data.length){
    return;
}

const latest = data[0];

const status =
latest.operational_status || "Unknown";

let statusColor="#64748b";
let statusBg="#f8fafc";

if(status==="Business As Usual"){
    statusColor="#22c55e";
    statusBg="#dcfce7";
}
else if(status==="Slightly Disrupted Operations"){
    statusColor="#f59e0b";
    statusBg="#fef3c7";
}
else if(status==="Heavily Disrupted Operations"){
    statusColor="#ef4444";
    statusBg="#fee2e2";
}

const banner =
document.getElementById("statusBanner");

banner.style.background=statusBg;
banner.style.borderLeft=`6px solid ${statusColor}`;

banner.innerHTML=
`⚠ Current Operational Status: <b>${status}</b>`;

document.getElementById("data-container").innerHTML=`

<div class="stat-card">
<h3>Status</h3>
<p>${status}</p>
</div>

<div class="stat-card">
<h3>Waiting Time</h3>
<p>${latest.current_waiting_time_days || 0}d</p>
</div>

<div class="stat-card">
<h3>Arrival Delay</h3>
<p>${latest.current_arrival_delay_days || 0}d</p>
</div>

<div class="stat-card">
<h3>At Berth</h3>
<p>${latest.vessels_at_berth || 0}</p>
</div>

`;

const values =
data.map(d => Number(d.graph_value_days) || 0);

const avg =
values.reduce((a,b)=>a+b,0) / values.length;

document.getElementById("avgDelay").innerText =
avg.toFixed(1) + " Days";

document.getElementById("maxDelay").innerText =
Math.max(...values) + " Days";

document.getElementById("minDelay").innerText =
Math.min(...values) + " Days";

document.getElementById("recordCount").innerText =
data.length;

new Chart(
document.getElementById("portChart"),
{
type:"line",
data:{
labels:data.map(d=>d.period_label),
datasets:[
{
label:"Delay Trends (Days)",
data:values,
borderColor:"#0ea5e9",
backgroundColor:"rgba(14,165,233,0.15)",
fill:true,
tension:0.3
}
]
},
options:{
responsive:true,
maintainAspectRatio:false
}
}
);

}
catch(error){
console.error(error);
}

}

loadData();

</script>

</body>
</html>
