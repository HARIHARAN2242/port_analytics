<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Port Details</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0f172a; padding: 20px; color: white; }
        .container { max-width: 900px; margin: auto; background: #1e293b; padding: 30px; border-radius: 12px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 30px 0; }
        .stat-card { background: #334155; padding: 20px; border-radius: 8px; border-left: 5px solid #38bdf8; }
        .download-btn { background: #10b981; color: white; padding: 10px 20px; border-radius: 6px; cursor: pointer; border: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1 id="port-title">Loading...</h1>
        <button id="downloadBtn" class="download-btn">Download Full CSV</button>
    </div>
    <div class="stats-grid" id="data-container"></div>
    <canvas id="portChart"></canvas>
</div>

<script>
    const portName = localStorage.getItem('selectedPort');
    document.getElementById('port-title').innerText = portName;

    document.getElementById('downloadBtn').onclick = async () => {
        try {
            const response = await fetch(`http://localhost:5000/api/download/${encodeURIComponent(portName)}`);
            if (!response.ok) throw new Error("Failed to download");
            
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${portName}_data.csv`;
            document.body.appendChild(a);
            a.click();
            a.remove();
        } catch (err) {
            alert("Could not download file. Check server logs.");
        }
    };

    async function loadData() {
        const res = await fetch(`http://localhost:5000/api/port-details/${encodeURIComponent(portName)}`);
        const data = await res.json();
        
        if (data.length > 0) {
            const latest = data[0];
            document.getElementById('data-container').innerHTML = `
                <div class="stat-card"><h3>Status</h3><p>${latest.operational_status || 'N/A'}</p></div>
                <div class="stat-card"><h3>Waiting Time</h3><p>${latest.current_waiting_time_days || 0} days</p></div>
                <div class="stat-card"><h3>Arrival Delay</h3><p>${latest.current_arrival_delay_days || 0} days</p></div>
                <div class="stat-card"><h3>At Berth</h3><p>${latest.vessels_at_berth || 0}</p></div>
            `;
            
            new Chart(document.getElementById('portChart'), {
                type: 'line',
                data: {
                    labels: data.map(d => d.period_label),
                    datasets: [{ label: 'Delay Trends', data: data.map(d => d.graph_value_days), borderColor: '#38bdf8' }]
                }
            });
        }
    }
    loadData();
</script>
</body>
</html>
