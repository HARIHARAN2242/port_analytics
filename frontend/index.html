<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HH Port Analytics</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
:root{
    --bg:#ffffff;
    --text:#0f172a;
    --blue:#0ea5e9;
    --sidebar:#f8fafc;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    display:flex;
    background:var(--bg);
    color:var(--text);
}

.sidebar{
    width:250px;
    height:100vh;
    background:var(--sidebar);
    padding:20px;
    border-right:1px solid #e2e8f0;
    overflow-y:auto;
}

.menu-item{
    display:block;
    padding:12px 0;
    text-decoration:none;
    color:#64748b;
    font-weight:600;
}

.menu-item:hover{
    color:var(--blue);
}

#port-submenu{
    display:none;
    padding-left:15px;
}

.port-sub-item{
    display:block;
    padding:6px 0;
    text-decoration:none;
    color:#64748b;
    cursor:pointer;
}

.port-sub-item:hover{
    color:var(--blue);
}

.dashboard-container{
    flex:1;
    padding:30px;
}

h1{
    margin-bottom:20px;
    color:#0f172a;
}

#map{
    height:650px;
    width:100%;
    border-radius:12px;
    border:1px solid #e2e8f0;
}

.anchor-marker{
    font-size:28px;
    text-align:center;
    line-height:30px;
    background:transparent;
    border:none;
}

.leaflet-tooltip{
    font-weight:bold;
    font-size:14px;
}

@media(max-width:768px){
    .sidebar{
        display:none;
    }
}
</style>
</head>

<body>

<aside class="sidebar">

    <h2>HH Port System</h2>

    <br>

    <a href="index.html" class="menu-item">
        Dashboard
    </a>

    <a href="#" class="menu-item" onclick="toggleSubmenu()">
        Analytics ▾
    </a>

    <div id="port-submenu"></div>

    <a href="about.html" class="menu-item">
        About
    </a>

    <a href="settings.html" class="menu-item">
        Settings
    </a>

</aside>

<main class="dashboard-container">

    <h1>Global Port Analytics</h1>

    <div id="map"></div>

</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// Fixed world map
const map = L.map('map', {
    worldCopyJump: false,
    maxBounds: [
        [-90, -180],
        [90, 180]
    ],
    maxBoundsViscosity: 1.0,
    minZoom: 2
}).setView([15, 55], 3);

// Non-repeating map
L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        noWrap: true,
        minZoom: 2,
        maxZoom: 8,
        attribution: '&copy; OpenStreetMap'
    }
).addTo(map);

let markers = [];

// Anchor emoji icon
const anchorIcon = L.divIcon({
    html: '⚓',
    className: 'anchor-marker',
    iconSize: [30, 30],
    iconAnchor: [15, 15]
});

function toggleSubmenu() {

    const submenu =
        document.getElementById('port-submenu');

    submenu.style.display =
        submenu.style.display === 'block'
            ? 'none'
            : 'block';
}

async function refreshData() {

    try {

        const response =
            await fetch('/api/analytics');

        const ports =
            await response.json();

        // Remove old markers
        markers.forEach(marker =>
            map.removeLayer(marker)
        );

        markers = [];

        // Sidebar
        const submenu =
            document.getElementById('port-submenu');

        submenu.innerHTML = '';

        ports.forEach(port => {

            // Sidebar item
            const item =
                document.createElement('a');

            item.className =
                'port-sub-item';

            item.innerText =
                port.port_name;

            item.href =
                'details.html';

            item.onclick = () => {

                localStorage.setItem(
                    'selectedPort',
                    port.port_name
                );

            };

            submenu.appendChild(item);

            // Skip invalid coordinates
            if (
                port.lat === null ||
                port.lng === null ||
                port.lat === undefined ||
                port.lng === undefined
            ) {
                return;
            }

            const lat =
                parseFloat(port.lat);

            const lng =
                parseFloat(port.lng);

            const marker =
                L.marker(
                    [lat, lng],
                    {
                        icon: anchorIcon
                    }
                ).addTo(map);

            // Hover shows port name
            marker.bindTooltip(
                port.port_name,
                {
                    permanent: false,
                    direction: 'top',
                    offset: [0, -10]
                }
            );

            // Click popup
            marker.bindPopup(`
                <div style="text-align:center;">
                    <h3>${port.port_name}</h3>

                    <button
                        onclick="
                            localStorage.setItem(
                                'selectedPort',
                                '${port.port_name}'
                            );
                            window.location.href='details.html';
                        "
                        style="
                            background:#0ea5e9;
                            color:white;
                            border:none;
                            padding:8px 15px;
                            border-radius:8px;
                            cursor:pointer;
                            font-weight:bold;
                        "
                    >
                        Analytics
                    </button>
                </div>
            `);

            markers.push(marker);

        });

    }
    catch(error){

        console.error(
            'Error loading data:',
            error
        );

    }
}

// Initial load
refreshData();

// Refresh every 5 minutes
setInterval(
    refreshData,
    5 * 60 * 1000
);

</script>

</body>
</html>
