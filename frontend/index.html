<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HH Port Analytics</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0f172a; color: white; padding: 30px; }
        .dashboard-container { max-width: 1000px; margin: auto; }
        h1 { font-weight: 800; font-size: 2.5em; color: #38bdf8; margin-bottom: 20px; text-align: center; }
        
        .port-nav { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin-bottom: 30px; }
        .port-btn { background: #1e293b; color: #cbd5e1; border: 1px solid #334155; padding: 12px 20px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .port-btn:hover { background: #38bdf8; color: white; }

        #map { height: 500px; border-radius: 12px; border: 2px solid #334155; background: #0f172a; }
        
        .leaflet-popup-content-wrapper { background: #1e293b; color: white; border-radius: 20px; text-align: center; }
        .view-details-btn { display: block; margin-top: 10px; background: #38bdf8; color: white; padding: 8px; border-radius: 15px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <h1>HH Port Analytics</h1>
    <div class="port-nav" id="port-list">Loading ports from database...</div>
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const map = L.map('map', { worldCopyJump: false }).setView([20, 45], 3);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { noWrap: true }).addTo(map);

    // Map database names to coordinates
    const portCoords = {
        "King Abdullah City": [22.455, 39.101],
        "Djibouti": [11.825, 42.590],
        "Mina Khalifa": [24.846, 54.673],
        "Jeddah": [21.529, 39.161],
        "Mundra": [22.848, 69.704],
        "Jebel Ali": [24.985, 55.027],
        "Port Louis": [-20.160, 57.497],
        "Salalah": [16.940, 54.005],
        "Mombasa": [-4.043, 39.668],
        "Colombo": [6.958, 79.843]
    };

    let activeMarker = null;

    async function init() {
        try {
            const res = await fetch('/api/analytics');
            const ports = await res.json();
            const list = document.getElementById('port-list');
            list.innerHTML = '';

            ports.forEach(p => {
                const btn = document.createElement('button');
                btn.className = 'port-btn';
                btn.innerText = p.port_name;
                btn.onclick = () => highlightPort(p.port_name);
                list.appendChild(btn);
            });
        } catch (err) { console.error("Error loading ports:", err); }
    }

    function highlightPort(name) {
        const coords = portCoords[name];
        if (!coords) return alert("Coordinates not found for this port.");

        if (activeMarker) map.removeLayer(activeMarker);
        map.flyTo(coords, 8, { duration: 1.5 });
        
        activeMarker = L.circleMarker(coords, {
            radius: 12, fillColor: "#38bdf8", color: "white", fillOpacity: 0.8
        }).addTo(map);

        activeMarker.bindPopup(`
            <div style="padding:10px;">
                <h3 style="margin:0;">${name}</h3>
                <a href="details.html" class="view-details-btn" onclick="localStorage.setItem('selectedPort', '${name}')">View Details</a>
            </div>
        `).openPopup();
    }

    init();
</script>
</body>
</html>
