<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HH Port Analytics</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #ffffff; --text: #0f172a; --blue: #0ea5e9; --sidebar: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; }
        
        .sidebar { width: 250px; background: var(--sidebar); height: 100vh; padding: 20px; border-right: 1px solid #e2e8f0; }
        .menu-item { display: block; padding: 12px 0; color: #64748b; text-decoration: none; font-weight: 600; border-left: 4px solid transparent; transition: 0.3s; }
        .menu-item:hover { color: var(--blue); }
        
        #port-submenu { display: none; padding-left: 15px; font-size: 0.9em; }
        .port-sub-item { display: block; padding: 5px 0; color: #94a3b8; text-decoration: none; cursor: pointer; }
        .port-sub-item:hover { color: var(--blue); }

        .dashboard-container { flex-grow: 1; padding: 40px; }
        #map { height: 500px; width: 100%; border-radius: 12px; border: 1px solid #e2e8f0; }
        @media (max-width: 768px) { .sidebar { display: none; } }
    </style>
</head>
<body>

<aside class="sidebar">
    <h3>HH Port System</h3>
    <a href="index.html" class="menu-item">Dashboard</a>
    <a href="#" class="menu-item" onclick="toggleSubmenu()">Analytics ▾</a>
    <div id="port-submenu"></div>
    <a href="about.html" class="menu-item">About</a>
    <a href="settings.html" class="menu-item">Settings</a>
</aside>

<main class="dashboard-container">
    <h1>Port Analytics Map</h1>
    <div id="map"></div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 1. Initialize map with constraints
    const map = L.map('map', { worldCopyJump: false, maxBounds: [[-90, -180], [90, 180]] }).setView([20, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { noWrap: true, minZoom: 2 }).addTo(map);

    let markers = [];
    let dataRefreshInterval;

    function toggleSubmenu() {
        const sub = document.getElementById('port-submenu');
        sub.style.display = sub.style.display === 'block' ? 'none' : 'block';
    }

    // 2. Fetch data and update BOTH map and sidebar
    async function refreshData() {
        try {
            const res = await fetch('/api/analytics');
            const ports = await res.json();

            // Update Sidebar
            const sub = document.getElementById('port-submenu');
            sub.innerHTML = ''; 
            ports.forEach(p => {
                const a = document.createElement('a');
                a.className = 'port-sub-item';
                a.innerText = p.port_name;
                a.href = 'details.html';
                a.onclick = () => localStorage.setItem('selectedPort', p.port_name);
                sub.appendChild(a);
            });

            // Update Map
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            ports.forEach(p => {
                if (p.lat && p.lng) {
                    const marker = L.marker([p.lat, p.lng]).addTo(map);
                    marker.bindPopup(`<b>${p.port_name}</b><br><a href="details.html" onclick="localStorage.setItem('selectedPort', '${p.port_name}')">View Details</a>`);
                    markers.push(marker);
                }
            });
        } catch (err) { console.error("Error refreshing data:", err); }
    }
    async function loadMapMarkers() {
    try {
        const res = await fetch('/api/analytics');
        const ports = await res.json();
        
        // Remove existing markers before drawing new ones
        markers.forEach(m => map.removeLayer(m));
        markers = [];

        ports.forEach(p => {
            if (p.lat && p.lng) {
                const marker = L.marker([p.lat, p.lng]).addTo(map);
                marker.bindPopup(`<b>${p.port_name}</b>`);
                markers.push(marker);
            }
        });
    } catch (err) {
        console.error("Error loading markers:", err);
    }
}
    // 3. Init
    async function init() {
        const path = window.location.pathname;
        const pageName = path.split('/').pop() || 'index.html';
        document.querySelectorAll('.menu-item').forEach(link => {
            if(link.getAttribute('href') === pageName) {
                link.style.color = 'var(--blue)';
                link.style.borderLeft = '4px solid var(--blue)';
            }
        });

        await refreshData();
        const refreshRate = parseInt(localStorage.getItem('userRefresh')) || 5;
        dataRefreshInterval = setInterval(refreshData, refreshRate * 60000);
    }

    init();
</script>
</body>
</html>
