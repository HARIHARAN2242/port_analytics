<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HH Port Analytics</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
:root{
    --bg:#ffffff;
    --text:#0f172a;
    --blue:#0ea5e9;
    --sidebar:#f8fafc;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    display:flex;
    background:var(--bg);
    color:var(--text);
}

.sidebar{
    width:250px;
    height:100vh;
    background:var(--sidebar);
    padding:20px;
    border-right:1px solid #e2e8f0;
}

.menu-item{
    display:block;
    padding:12px 0;
    text-decoration:none;
    color:#64748b;
    font-weight:600;
}

.menu-item:hover{
    color:var(--blue);
}

#port-submenu{
    display:none;
    padding-left:15px;
}

.port-sub-item{
    display:block;
    padding:6px 0;
    text-decoration:none;
    color:#64748b;
    cursor:pointer;
}

.port-sub-item:hover{
    color:var(--blue);
}

.dashboard-container{
    flex:1;
    padding:30px;
}

h1{
    margin-bottom:20px;
}

#map{
    height:600px;
    width:100%;
    border-radius:12px;
    border:1px solid #e2e8f0;
}
</style>

</head>

<body>

<aside class="sidebar">
    <h2>HH Port System</h2>
    <br>

```
<a href="index.html" class="menu-item">Dashboard</a>

<a href="#" class="menu-item" onclick="toggleSubmenu()">
    Analytics ▾
</a>

<div id="port-submenu"></div>

<a href="about.html" class="menu-item">About</a>
<a href="settings.html" class="menu-item">Settings</a>
```

</aside>

<main class="dashboard-container">
    <h1>Global Port Analytics</h1>
    <div id="map"></div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([20,0],2);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    maxZoom:18
}
).addTo(map);

let markers=[];

const anchorIcon = L.icon({
    iconUrl: 'https://cdn-icons-png.flaticon.com/512/684/684908.png',
    iconSize: [30, 30],
    iconAnchor: [15, 30],
    popupAnchor: [0, -30]
});

function toggleSubmenu(){
    const sub=document.getElementById('port-submenu');

    if(sub.style.display==="block"){
        sub.style.display="none";
    }else{
        sub.style.display="block";
    }
}

async function refreshData(){

    try{

        const response=await fetch('/api/analytics');
        const ports=await response.json();

        markers.forEach(m=>map.removeLayer(m));
        markers=[];

        const submenu=document.getElementById('port-submenu');
        submenu.innerHTML='';

        const bounds=[];

        ports.forEach(port=>{

            const item=document.createElement('a');

            item.className='port-sub-item';
            item.innerText=port.port_name;
            item.href='details.html';

            item.onclick=()=>{
                localStorage.setItem(
                    'selectedPort',
                    port.port_name
                );
            };

            submenu.appendChild(item);

            if(
                port.lat===null ||
                port.lng===null ||
                port.lat===undefined ||
                port.lng===undefined
            ){
                return;
            }

            const lat=parseFloat(port.lat);
            const lng=parseFloat(port.lng);

            bounds.push([lat,lng]);

            const marker = L.marker(
            [lat, lng],
            { icon: anchorIcon }
            ).addTo(map);
            marker.bindTooltip(port.port_name, {
    permanent: false,
    direction: 'top',
    offset: [0, -20]
});
       marker.bindPopup(`
<div style="text-align:center;">
    <h3>${port.port_name}</h3>

    <button
        onclick="
        localStorage.setItem(
            'selectedPort',
            '${port.port_name}'
        );
        window.location.href='details.html';
        "
        style="
            background:#0ea5e9;
            color:white;
            border:none;
            padding:8px 15px;
            border-radius:8px;
            cursor:pointer;
        "
    >
        Analytics
    </button>
</div>
`);
   
            markers.push(marker);

        });

        if(bounds.length > 0){
    map.fitBounds(bounds, {
        padding: [50, 50]
    });
}

    }catch(error){
        console.error(error);
    }
}

refreshData();

</script>

</body>
</html>
